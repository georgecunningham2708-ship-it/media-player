<!DOCTYPE html>
<html>
<head>
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background-color: black;
    color: #0a0a0a; /* slightly brighter so it shows when brightened */
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    overflow: hidden;
  }

  #text {
    opacity: 0;
    transition: opacity 2s;
  }

  .flash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    animation: flicker 10s infinite;
  }

  @keyframes flicker {
    0%, 96%, 100% { opacity: 1; }
    97% { opacity: 0.8; }
    98% { opacity: 1; }
    99% { opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="flash"></div>
<div id="text">I CAN SEE YOU</div>

<script>
  // Delay before text slowly appears
  setTimeout(() => {
    document.getElementById("text").style.opacity = "1";
  }, 4000);

  // Quick flash (barely visible)
  setTimeout(() => {
    document.body.style.color = "#222";
    setTimeout(() => {
      document.body.style.color = "#0a0a0a";
    }, 150);
  }, 7000);
</script>

</body>
</html>
