<!DOCTYPE html>
<html>
<head>
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background-color: black;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    font-size: 42px;
    overflow: hidden;
  }

  #text {
    opacity: 0;
  }

  /* red flash overlay */
  #flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: red;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="flash"></div>
<div id="text">I CAN SEE YOU</div>

<script>
  const text = document.getElementById("text");
  const flash = document.getElementById("flash");

  // Fade in text
  setTimeout(function() {
    text.style.transition = "opacity 2s";
    text.style.opacity = "1";
  }, 4000);

  // Subtle white flash later
  setTimeout(function() {
    document.body.style.color = "#222";
    setTimeout(function() {
      document.body.style.color = "#0a0a0a";
    }, 200);
  }, 7000);

  // CLICK = RED FLASH
  document.addEventListener("click", function() {
    flash.style.transition = "opacity 0.1s";
    flash.style.opacity = "1";

    setTimeout(function() {
      flash.style.opacity = "0";
    }, 120);
  });
</script>

</body>
</html>
