<!DOCTYPE html>
<html>
<head>
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background-color: black;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    font-size: 42px;
    overflow: hidden;
    position: relative;
  }

  #text {
    opacity: 0;
    z-index: 10;
    position: relative;
  }

  #flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: red;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }

  .eye {
    position: absolute;
    width: 60px; /* adjust size as needed */
    height: 60px;
    border-radius: 50%;
    background-color: black;
    border: 2px solid #555;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
  }

  .eye::before {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: white;
    border-radius: 50%;
    top: 18px;
    left: 18px;
    box-shadow: 18px 0 0 white; /* second reflection dot */
  }
</style>
</head>
<body>

<div id="flash"></div>
<div id="text">I CAN SEE YOU</div>

<script>
  const text = document.getElementById("text");
  const flash = document.getElementById("flash");

  // Fade in text
  setTimeout(function() {
    text.style.transition = "opacity 2s";
    text.style.opacity = "1";
  }, 4000);

  // Subtle white flash later
  setTimeout(function() {
    document.body.style.color = "#222";
    setTimeout(function() {
      document.body.style.color = "#0a0a0a";
    }, 200);
  }, 7000);

  // CLICK = RED FLASH
  document.addEventListener("click", function() {
    flash.style.transition = "opacity 0.1s";
    flash.style.opacity = "1";

    setTimeout(function() {
      flash.style.opacity = "0";
    }, 120);
  });

  // Create analog horror eyes
  function createEyes(num) {
    for(let i = 0; i < num; i++){
      const eye = document.createElement("div");
      eye.classList.add("eye");

      // Random position
      eye.style.top = Math.random() * window.innerHeight + "px";
      eye.style.left = Math.random() * window.innerWidth + "px";

      document.body.appendChild(eye);
    }
  }

  createEyes(20); // spawn 20 eyes
</script>

</body>
</html>
