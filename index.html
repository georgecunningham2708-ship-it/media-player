<!DOCTYPE html>
<html>
<head>
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background-color: black;
    color: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    font-size: 42px;
    overflow: hidden;
    position: relative;
  }

  #text {
    opacity: 0;
    z-index: 10;
    position: relative;
  }

  /* red flash overlay */
  #flash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: red;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
  }

  .eye {
    position: absolute;
    width: 60px; /* size of the analog horror eye */
    height: 60px;
    pointer-events: none;
    opacity: 0.8;
    transition: transform 0.1s;
  }
</style>
</head>
<body>

<div id="flash"></div>
<div id="text">I CAN SEE YOU</div>

<script>
  const text = document.getElementById("text");
  const flash = document.getElementById("flash");

  // Fade in text
  setTimeout(function() {
    text.style.transition = "opacity 2s";
    text.style.opacity = "1";
  }, 4000);

  // Subtle white flash later
  setTimeout(function() {
    document.body.style.color = "#222";
    setTimeout(function() {
      document.body.style.color = "#0a0a0a";
    }, 200);
  }, 7000);

  // CLICK = RED FLASH
  document.addEventListener("click", function() {
    flash.style.transition = "opacity 0.1s";
    flash.style.opacity = "1";

    setTimeout(function() {
      flash.style.opacity = "0";
    }, 120);
  });

  // Add analog horror eyes
  function createEyes(num) {
    for(let i = 0; i < num; i++){
      const eye = document.createElement("img");
      eye.src = "/mnt/data/f3f76eb9-8d15-4b4d-8fc1-4903fad7a654.png"; // your uploaded eye
      eye.classList.add("eye");

      // Random position
      eye.style.top = Math.random() * window.innerHeight + "px";
      eye.style.left = Math.random() * window.innerWidth + "px";

      document.body.appendChild(eye);
    }
  }

  // Spawn 20 eyes on page load
  createEyes(20);
</script>

</body>
</html>
