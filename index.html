<!DOCTYPE html>
<html>
<head>
<title>video.mp4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    background-color: black;
    color: #040404;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
  }

  .flash {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.7; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="flash"></div>
<div>I CAN SEE YOU</div>

</body>
</html>
